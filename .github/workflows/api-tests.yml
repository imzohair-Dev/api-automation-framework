name: 🚀 SaaS API Test Suite - CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run every day at 08:00 UTC (automated regression)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging

env:
  NODE_VERSION: '20'
  REPORTS_DIR: reports/html

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: API Tests on DEV
  # ─────────────────────────────────────────────
  api-tests-dev:
    name: 🧪 API Tests (DEV)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.environment == 'dev'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📁 Create reports directories
        run: mkdir -p reports/html reports/allure-results

      - name: 🔐 Run Auth Collection
        run: |
          npx newman run collections/01_Auth.postman_collection.json \
            --environment environments/dev.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/html/auth-report.html \
            --reporter-htmlextra-title "Auth Tests - DEV" \
            --reporter-htmlextra-darkTheme \
            --bail
        continue-on-error: false

      - name: 👥 Run Users Collection
        run: |
          npx newman run collections/02_Users.postman_collection.json \
            --environment environments/dev.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/html/users-report.html \
            --reporter-htmlextra-title "User Management Tests - DEV" \
            --reporter-htmlextra-darkTheme
        continue-on-error: true

      - name: 🛍️ Run Products Collection
        run: |
          npx newman run collections/03_Products.postman_collection.json \
            --environment environments/dev.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/html/products-report.html \
            --reporter-htmlextra-title "Product Catalog Tests - DEV" \
            --reporter-htmlextra-darkTheme
        continue-on-error: true

      - name: 🛒 Run Cart Collection
        run: |
          npx newman run collections/04_Cart.postman_collection.json \
            --environment environments/dev.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/html/cart-report.html \
            --reporter-htmlextra-title "Cart Management Tests - DEV" \
            --reporter-htmlextra-darkTheme
        continue-on-error: true

      - name: 📦 Run Orders Collection
        run: |
          npx newman run collections/05_Orders.postman_collection.json \
            --environment environments/dev.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/html/orders-report.html \
            --reporter-htmlextra-title "Orders & Checkout Tests - DEV" \
            --reporter-htmlextra-darkTheme
        continue-on-error: true

      - name: 🎯 Run Full Test Suite
        id: full_suite
        run: |
          npx newman run collections/SaaS_API_Full_Suite.postman_collection.json \
            --environment environments/dev.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/html/full-suite-report.html \
            --reporter-htmlextra-title "SaaS API Full Suite - DEV" \
            --reporter-htmlextra-darkTheme \
            --reporter-htmlextra-includeRequestBody \
            --reporter-htmlextra-includeResponseBody

      - name: 📊 Upload HTML Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-reports-dev-${{ github.run_number }}
          path: reports/html/
          retention-days: 30

      - name: 📋 Test Summary
        if: always()
        run: |
          echo "## 🧪 API Test Results - DEV" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Auth | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| 👥 Users | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛍️ Products | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛒 Cart | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Orders | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎯 Full Suite | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📎 HTML reports available in artifacts: \`api-test-reports-dev-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 2: API Tests on STAGING
  # ─────────────────────────────────────────────
  api-tests-staging:
    name: 🧪 API Tests (STAGING)
    runs-on: ubuntu-latest
    needs: api-tests-dev
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.environment == 'staging')

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📁 Create reports directories
        run: mkdir -p reports/html

      - name: 🎯 Run Full Suite on STAGING
        run: |
          npx newman run collections/SaaS_API_Full_Suite.postman_collection.json \
            --environment environments/staging.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/html/staging-full-report.html \
            --reporter-htmlextra-title "SaaS API Full Suite - STAGING" \
            --reporter-htmlextra-darkTheme \
            --reporter-htmlextra-includeRequestBody \
            --reporter-htmlextra-includeResponseBody

      - name: 📊 Upload STAGING Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-reports-staging-${{ github.run_number }}
          path: reports/html/
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 3: Notify on Failure
  # ─────────────────────────────────────────────
  notify-failure:
    name: 📣 Failure Notification
    runs-on: ubuntu-latest
    needs: [api-tests-dev, api-tests-staging]
    if: failure()

    steps:
      - name: 🚨 Report Failure
        run: |
          echo "## ❌ API Tests FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more API test suites failed on run **#${{ github.run_number }}**" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
